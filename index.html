<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will you be my girlfriend? 💕</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Floating hearts background -->
  <div class="hearts-bg" id="heartsBg"></div>

  <!-- Flash overlay -->
  <div class="flash-overlay" id="flashOverlay"></div>

  <!-- Flash sound -->
  <audio id="meowSound" preload="auto">
    <source src="flash.m4a" type="audio/mp4">
  </audio>

  <!-- Meow sound -->
  <audio id="catMeow" preload="auto">
    <source src="https://www.myinstants.com/media/sounds/meow.mp3" type="audio/mpeg">
  </audio>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <span class="emoji-top">💕</span>
    <h1>Will you be my girlfriend?</h1>
    <p class="subtitle">Choose wisely… 😉</p>

    <div class="btn-group" id="btnGroup">
      <button class="btn btn-yes" id="btnYes">YES 💖</button>
      <button class="btn btn-no in-flow" id="btnNo">NO 😈</button>
    </div>

    <div class="warning-box" id="warningBox">
      <strong>😾 Really?! You're trying to say NO?!</strong><br/>
      <span id="warningText">The cat is NOT impressed. Try again!</span><br/>
      <div class="cat-art" aria-label="Angry cat">
        <img src="cat-gun.png" alt="Angry cat with gun" width="500" height="400">
      </div>
    </div>

    <p class="attempts-label" id="attemptsLabel"></p>
  </div>

  <!-- Success screen -->
  <div id="success-screen">
    <span class="success-emoji">❤️</span>
    <h2 class="success-title">She said YES! 🎉</h2>
    <p class="success-message">
      You made the best decision of your life! 💕<br/>
      I promise to make every moment magical. 🌹
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
