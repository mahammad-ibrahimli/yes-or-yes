<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will you be my girlfriend? 💕</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe0ec 0%, #ffc2d4 50%, #ffb3c6 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Floating hearts background ── */
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart-particle {
      position: absolute;
      bottom: -60px;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-110vh) rotate(30deg) scale(1.2); opacity: 0; }
    }

    /* ── Main card ── */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 12px 40px rgba(255, 100, 130, 0.25);
      animation: cardPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardPop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .emoji-top {
      font-size: 3.5rem;
      margin-bottom: 0.5rem;
      display: block;
      animation: bounce 1.6s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: #c9184a;
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .subtitle {
      color: #e5637a;
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.85rem 2.2rem;
      font-size: 1.15rem;
      font-weight: 700;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      user-select: none;
    }

    .btn-yes {
      background: linear-gradient(135deg, #43d66c, #1db954);
      color: #fff;
      box-shadow: 0 4px 16px rgba(29, 185, 84, 0.4);
    }

    .btn-yes:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 22px rgba(29, 185, 84, 0.55);
    }

    .btn-yes:active {
      transform: scale(0.97);
    }

    .btn-no {
      background: linear-gradient(135deg, #ff5c5c, #e02020);
      color: #fff;
      box-shadow: 0 4px 16px rgba(224, 32, 32, 0.35);
      /* position fixed during game so it can escape anywhere on screen */
      position: fixed;
      z-index: 999;
      transition: top 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  left 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  transform 0.15s ease,
                  box-shadow 0.15s ease;
    }

    .btn-no.in-flow {
      /* Before the game starts NO is rendered in the normal flow */
      position: static;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    /* ── Warning / angry cat ── */
    .warning-box {
      margin-top: 1.5rem;
      background: #fff3f5;
      border: 2px solid #ffb3c1;
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      color: #c9184a;
      font-size: 0.95rem;
      animation: shake 0.4s ease;
      display: none;
    }

    .warning-box.visible { display: block; }

    .cat-art {
      margin-top: 0.7rem;
      display: inline-block;
      animation: catWobble 0.5s ease infinite alternate;
    }

    @keyframes catWobble {
      from { transform: rotate(-4deg) scale(1); }
      to   { transform: rotate(4deg)  scale(1.04); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }

    /* ── Attempt counter ── */
    .attempts-label {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: #e5637a;
      min-height: 1.2em;
    }

    /* ── Success screen ── */
    #success-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: linear-gradient(135deg, #ffe0ec, #ffc2d4);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.7s ease both;
    }

    #success-screen.visible { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .success-emoji {
      font-size: 5rem;
      animation: heartBeat 0.9s ease infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.3); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.2); }
      70%       { transform: scale(1); }
    }

    .success-title {
      font-size: clamp(2rem, 6vw, 3.2rem);
      color: #c9184a;
      margin: 0.6rem 0 0.4rem;
      font-weight: 900;
    }

    .success-message {
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: #e5637a;
      max-width: 380px;
      line-height: 1.6;
    }

    /* ── Burst hearts on YES click ── */
    .heart-burst {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      z-index: 200;
      animation: burst 0.9s ease-out forwards;
    }

    @keyframes burst {
      0%   { transform: translate(0, 0) scale(0.5); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(1.4); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Floating hearts background -->
  <div class="hearts-bg" id="heartsBg"></div>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <span class="emoji-top">💕</span>
    <h1>Will you be my girlfriend?</h1>
    <p class="subtitle">Choose wisely… 😉</p>

    <div class="btn-group" id="btnGroup">
      <button class="btn btn-yes" id="btnYes">YES 💖</button>
      <button class="btn btn-no in-flow" id="btnNo">NO 😈</button>
    </div>

    <div class="warning-box" id="warningBox">
      <strong>😾 Really?! You're trying to say NO?!</strong><br/>
      <span id="warningText">The cat is NOT impressed. Try again!</span><br/>
      <div class="cat-art" aria-label="Angry cat">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
          <!-- body -->
          <ellipse cx="60" cy="72" rx="34" ry="26" fill="#ff9f43"/>
          <!-- head -->
          <circle cx="60" cy="42" r="28" fill="#ff9f43"/>
          <!-- ears -->
          <polygon points="38,20 30,4 50,16" fill="#ff9f43"/>
          <polygon points="82,20 90,4 70,16" fill="#ff9f43"/>
          <!-- inner ears -->
          <polygon points="40,18 34,8 48,16" fill="#ffb8c6"/>
          <polygon points="80,18 86,8 72,16" fill="#ffb8c6"/>
          <!-- angry eyes (slanted) -->
          <line x1="44" y1="34" x2="52" y2="38" stroke="#333" stroke-width="3" stroke-linecap="round"/>
          <line x1="68" y1="38" x2="76" y2="34" stroke="#333" stroke-width="3" stroke-linecap="round"/>
          <circle cx="48" cy="39" r="5" fill="#333"/>
          <circle cx="72" cy="39" r="5" fill="#333"/>
          <circle cx="49" cy="38" r="1.5" fill="#fff"/>
          <circle cx="73" cy="38" r="1.5" fill="#fff"/>
          <!-- nose -->
          <polygon points="60,47 56,52 64,52" fill="#e84393"/>
          <!-- mouth (grumpy) -->
          <path d="M52,56 Q56,52 60,55 Q64,58 68,54" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
          <!-- whiskers left -->
          <line x1="32" y1="48" x2="54" y2="50" stroke="#555" stroke-width="1.5"/>
          <line x1="32" y1="53" x2="54" y2="52" stroke="#555" stroke-width="1.5"/>
          <!-- whiskers right -->
          <line x1="88" y1="48" x2="66" y2="50" stroke="#555" stroke-width="1.5"/>
          <line x1="88" y1="53" x2="66" y2="52" stroke="#555" stroke-width="1.5"/>
          <!-- tail -->
          <path d="M94,84 Q110,70 106,56 Q102,44 94,50" stroke="#ff9f43" stroke-width="7" fill="none" stroke-linecap="round"/>
          <!-- stripes -->
          <path d="M46,68 Q60,64 74,68" stroke="#e07b20" stroke-width="2.5" fill="none"/>
          <path d="M42,76 Q60,71 78,76" stroke="#e07b20" stroke-width="2.5" fill="none"/>
        </svg>
      </div>
    </div>

    <p class="attempts-label" id="attemptsLabel"></p>
  </div>

  <!-- Success screen -->
  <div id="success-screen">
    <span class="success-emoji">❤️</span>
    <h2 class="success-title">She said YES! 🎉</h2>
    <p class="success-message">
      You made the best decision of your life! 💕<br/>
      I promise to make every moment magical. 🌹
    </p>
  </div>

  <script>
    /* ── Config ── */
    const WARN_AFTER = 3;   // attempts before warning appears
    const warningMessages = [
      "The cat is NOT impressed. Try again! 😤",
      "Still trying to say NO?! How dare you! 😾",
      "The cat demands you reconsider. NOW. 🐱‍👤",
      "NO is not an option. The cat has spoken. 😼",
      "Seriously?! The cat is calling reinforcements! 🐱",
    ];

    /* ── State ── */
    let attempts = 0;
    let noIsFixed = false;

    /* ── Element refs ── */
    const btnNo       = document.getElementById('btnNo');
    const btnYes      = document.getElementById('btnYes');
    const warningBox  = document.getElementById('warningBox');
    const warningText = document.getElementById('warningText');
    const attemptsLbl = document.getElementById('attemptsLabel');
    const successScr  = document.getElementById('success-screen');
    const heartsBg    = document.getElementById('heartsBg');

    /* ────────────────────────────────────────────
       Floating background hearts
    ──────────────────────────────────────────── */
    const HEART_CHARS = ['💕', '💖', '💗', '💝', '💓', '💘', '🌸', '✨'];

    function spawnBgHeart() {
      const el = document.createElement('span');
      el.className = 'heart-particle';
      el.textContent = HEART_CHARS[Math.floor(Math.random() * HEART_CHARS.length)];
      const left = Math.random() * 100;
      const duration = 6 + Math.random() * 8;
      const delay = Math.random() * 4;
      el.style.cssText = `left:${left}%;animation-duration:${duration}s;animation-delay:${delay}s`;
      heartsBg.appendChild(el);
      setTimeout(() => el.remove(), (duration + delay) * 1000);
    }

    // Seed a few hearts immediately, then keep spawning
    for (let i = 0; i < 12; i++) spawnBgHeart();
    setInterval(spawnBgHeart, 900);

    /* ────────────────────────────────────────────
       NO button – escape on hover
    ──────────────────────────────────────────── */
    function moveNoButton() {
      const btnW = btnNo.offsetWidth;
      const btnH = btnNo.offsetHeight;
      const margin = 16;

      const maxX = window.innerWidth  - btnW - margin;
      const maxY = window.innerHeight - btnH - margin;

      const newLeft = margin + Math.random() * maxX;
      const newTop  = margin + Math.random() * maxY;

      btnNo.style.left = newLeft + 'px';
      btnNo.style.top  = newTop  + 'px';
    }

    function activateNoEscape() {
      if (noIsFixed) return;
      noIsFixed = true;

      // Snapshot current screen position before switching to fixed
      const rect = btnNo.getBoundingClientRect();
      btnNo.classList.remove('in-flow');
      btnNo.style.left = rect.left + 'px';
      btnNo.style.top  = rect.top  + 'px';

      // Move immediately on first hover
      setTimeout(moveNoButton, 30);
    }

    btnNo.addEventListener('mouseenter', () => {
      activateNoEscape();
      attempts++;
      moveNoButton();
      updateAttempts();
    });

    // Touch support: move on touchstart so it dodges before the tap registers
    btnNo.addEventListener('touchstart', (e) => {
      e.preventDefault();
      activateNoEscape();
      attempts++;
      moveNoButton();
      updateAttempts();
    }, { passive: false });

    function updateAttempts() {
      if (attempts === 1) {
        attemptsLbl.textContent = `You've tried to click NO ${attempts} time… sneaky! 👀`;
      } else if (attempts > 1) {
        attemptsLbl.textContent = `You've tried to click NO ${attempts} times… give up! 😂`;
      }

      if (attempts >= WARN_AFTER) {
        warningBox.classList.add('visible');
        const msgIdx = Math.min(attempts - WARN_AFTER, warningMessages.length - 1);
        warningText.textContent = warningMessages[msgIdx];
        // Re-trigger shake animation
        warningBox.style.animation = 'none';
        warningBox.offsetHeight; // reflow
        warningBox.style.animation = '';
      }
    }

    /* ────────────────────────────────────────────
       YES button – success screen
    ──────────────────────────────────────────── */
    btnYes.addEventListener('click', (e) => {
      burstHearts(e.clientX, e.clientY);
      setTimeout(() => {
        successScr.classList.add('visible');
        launchSuccessHearts();
      }, 400);
    });

    function burstHearts(cx, cy) {
      const count = 16;
      for (let i = 0; i < count; i++) {
        const el = document.createElement('span');
        el.className = 'heart-burst';
        el.textContent = HEART_CHARS[Math.floor(Math.random() * HEART_CHARS.length)];
        const angle = (i / count) * 2 * Math.PI;
        const dist  = 80 + Math.random() * 120;
        el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
        el.style.left = cx + 'px';
        el.style.top  = cy + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
      }
    }

    function launchSuccessHearts() {
      for (let i = 0; i < 20; i++) spawnBgHeart();
      setInterval(spawnBgHeart, 400);
    }

    /* ────────────────────────────────────────────
       Resize guard – reposition NO if it's fixed
    ──────────────────────────────────────────── */
    window.addEventListener('resize', () => {
      if (noIsFixed) moveNoButton();
    });
  </script>
</body>
</html>
